name: Front - Build & Deploy (Local Docker)

on:
  push:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────────
  # PRODUCTION — main → pablocabrera.dev
  # Original server, original infrastructure
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy Production (pablocabrera.dev)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (local Docker build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd ${{ secrets.VPS_PATH }}

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "Building containers..."
            docker compose -f docker-compose.prod.yml build

            echo "Restarting containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Cleaning unused images..."
            docker image prune -f

  # ──────────────────────────────────────────────
  # BETA — develop → beta.pablocabrera.dev
  # Docker Swarm infrastructure (new servers)
  # ──────────────────────────────────────────────
  deploy-beta:
    name: Deploy Beta (beta.pablocabrera.dev)
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Build image on Worker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_WORKER_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_PORT }}
          script: |
            set -e
            bash /opt/scripts/deploy-beta.sh ${{ github.event.repository.name }} ${{ github.ref_name }}

      - name: Deploy stack on Master
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_MASTER_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_PORT }}
          script: |
            set -e
            docker stack deploy -c /opt/docker-swarm/portafolio-stack.yml portafolio

  # ──────────────────────────────────────────────
  # NOTIFY — always runs after whichever job ran
  # ──────────────────────────────────────────────
  notify:
    name: Discord notification
    runs-on: ubuntu-latest
    needs: [deploy, deploy-beta]
    if: always()

    steps:
      - name: Send Discord webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          RESULT: ${{ needs.deploy.result == 'skipped' && needs['deploy-beta'].result || needs.deploy.result }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping"
            exit 0
          fi

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          if [ "$RESULT" = "success" ]; then
            COLOR=3066993
            STATUS="✅ Deploy successful"
            DESC="Branch \`${BRANCH}\` deployed successfully"
          else
            COLOR=15158332
            STATUS="❌ Deploy failed"
            DESC="Branch \`${BRANCH}\` deployment failed"
          fi

          jq -n \
            --arg title "$STATUS" \
            --arg desc "$DESC" \
            --arg branch "$BRANCH" \
            --arg run "$RUN_URL" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                fields: [
                  {name: "Branch", value: $branch, inline: true},
                  {name: "CI Run", value: $run, inline: false}
                ]
              }]
            }' \
          | curl -H "Content-Type: application/json" -d @- "$WEBHOOK"
