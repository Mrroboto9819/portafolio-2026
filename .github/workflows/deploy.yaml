name: Front - Build & Deploy (Local Docker)

on:
  push:
    branches: ["main", "develop"]

jobs:
  # Production: main -> pablocabrera.dev
  deploy:
    name: Deploy Production (pablocabrera.dev)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (local Docker build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd ${{ secrets.VPS_PATH }}

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "Building containers..."
            docker compose -f docker-compose.prod.yml build

            echo "Restarting containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Cleaning unused images..."
            docker image prune -f

  # Beta: develop -> beta.pablocabrera.dev
  deploy-beta:
    name: Deploy Beta (beta.pablocabrera.dev)
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Build image on Worker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_WORKER_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_PORT }}
          script: |
            set -e
            bash /opt/scripts/deploy-beta.sh ${{ github.event.repository.name }} ${{ github.ref_name }}

      - name: Deploy stack on Master
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_MASTER_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_PORT }}
          script: |
            set -e
            docker stack deploy -c /opt/docker-swarm/portafolio-stack.yml portafolio

  # Notify: always runs after whichever deploy job was eligible
  notify:
    name: Discord notification
    runs-on: ubuntu-latest
    needs: [deploy, deploy-beta]
    if: always()

    steps:
      - name: Send Discord webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_BETA_RESULT: ${{ needs['deploy-beta'].result }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping"
            exit 0
          fi

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          SHORT_SHA="$(echo "$SHA" | cut -c1-7)"
          TIMESTAMP="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          SAFE_COMMIT_MESSAGE="${COMMIT_MESSAGE:-No commit message available}"
          SAFE_COMPARE_URL="${COMPARE_URL:-N/A}"

          if [ "$BRANCH" = "main" ]; then
            TARGET_ENV="production"
            TARGET_URL="https://pablocabrera.dev"
          elif [ "$BRANCH" = "develop" ]; then
            TARGET_ENV="beta"
            TARGET_URL="https://beta.pablocabrera.dev"
          else
            TARGET_ENV="unknown"
            TARGET_URL="N/A"
          fi

          if [ "$DEPLOY_RESULT" = "skipped" ]; then
            RESULT="$DEPLOY_BETA_RESULT"
            EXECUTED_JOB="deploy-beta"
          else
            RESULT="$DEPLOY_RESULT"
            EXECUTED_JOB="deploy"
          fi

          if [ "$RESULT" = "success" ]; then
            COLOR=3066993
            STATUS="Deploy successful"
            DESC="Branch \`${BRANCH}\` deployed to \`${TARGET_ENV}\`."
          elif [ "$RESULT" = "cancelled" ]; then
            COLOR=9807270
            STATUS="Deploy cancelled"
            DESC="Deployment was cancelled for branch \`${BRANCH}\`."
          elif [ "$RESULT" = "skipped" ]; then
            COLOR=10181046
            STATUS="Deploy skipped"
            DESC="No deploy job executed for branch \`${BRANCH}\`."
          else
            COLOR=15158332
            STATUS="Deploy failed"
            DESC="Branch \`${BRANCH}\` failed to deploy to \`${TARGET_ENV}\`."
          fi

          jq -n \
            --arg title "$STATUS" \
            --arg desc "$DESC" \
            --arg branch "$BRANCH" \
            --arg environment "$TARGET_ENV" \
            --arg target "$TARGET_URL" \
            --arg actor "$ACTOR" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg commit_message "$SAFE_COMMIT_MESSAGE" \
            --arg run_number "$RUN_NUMBER" \
            --arg run "$RUN_URL" \
            --arg event "$EVENT_NAME" \
            --arg compare "$SAFE_COMPARE_URL" \
            --arg executed_job "$EXECUTED_JOB" \
            --arg deploy_result "$DEPLOY_RESULT" \
            --arg deploy_beta_result "$DEPLOY_BETA_RESULT" \
            --arg timestamp "$TIMESTAMP" \
            --arg repo "$REPO" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                fields: [
                  {name: "Branch", value: $branch, inline: true},
                  {name: "Environment", value: $environment, inline: true},
                  {name: "Actor", value: $actor, inline: true},
                  {name: "Executed Job", value: $executed_job, inline: true},
                  {name: "deploy result", value: $deploy_result, inline: true},
                  {name: "deploy-beta result", value: $deploy_beta_result, inline: true},
                  {name: "Commit", value: ("[`" + $sha + "`]" + "(" + $commit_url + ")"), inline: true},
                  {name: "Commit Message", value: $commit_message, inline: false},
                  {name: "Target URL", value: $target, inline: false},
                  {name: "CI Run", value: ("[Run #" + $run_number + "](" + $run + ")"), inline: false},
                  {name: "Event", value: $event, inline: true},
                  {name: "Compare", value: $compare, inline: false},
                  {name: "Timestamp", value: $timestamp, inline: false}
                ],
                footer: {
                  text: $repo
                }
              }]
            }' \
          | curl -H "Content-Type: application/json" -d @- "$WEBHOOK"
