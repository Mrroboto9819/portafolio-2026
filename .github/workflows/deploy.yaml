name: Deploy Portafolio

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NAMESPACE: portafolio
  CONTAINERD_SOCK: /run/k3s/containerd/containerd.sock

jobs:
  deploy:
    runs-on: [self-hosted, portafolio]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          BRANCH="${GITHUB_REF##refs/heads/}"
          SHA=$(git rev-parse --short HEAD)

          if [ "$BRANCH" = "main" ]; then
            echo "deploy_name=portafolio-prod" >> "$GITHUB_OUTPUT"
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
            echo "node_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_name=portafolio-dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=develop" >> "$GITHUB_OUTPUT"
            echo "node_env=development" >> "$GITHUB_OUTPUT"
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "image=portafolio-2026:${SHA}" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH | Deploy: portafolio-$([ '$BRANCH' = 'main' ] && echo prod || echo dev) | SHA: $SHA"

      - name: Install tools
        run: |
          if ! command -v buildctl &>/dev/null; then
            curl -sSL https://github.com/moby/buildkit/releases/download/v0.18.2/buildkit-v0.18.2.linux-amd64.tar.gz | \
              tar xz -C /usr/local/
          fi

          if ! command -v ctr &>/dev/null; then
            curl -sSL https://github.com/containerd/containerd/releases/download/v1.7.24/containerd-1.7.24-linux-amd64.tar.gz | \
              tar xz -C /usr/local/
          fi

          if ! command -v kubectl &>/dev/null; then
            curl -sSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
            chmod +x /usr/local/bin/kubectl
          fi

      - name: Start buildkitd
        run: |
          pkill buildkitd || true
          sleep 2
          if pgrep buildkitd > /dev/null; then
            kill -9 $(pgrep buildkitd) 2>/dev/null || true
            sleep 1
          fi

          buildkitd --addr unix:///run/buildkit/buildkitd.sock \
            --oci-worker-gc=true \
            --oci-worker-gc-keepstorage=2147483648 &

          for i in $(seq 1 30); do
            if [ -S /run/buildkit/buildkitd.sock ]; then
              echo "buildkitd ready"
              break
            fi
            sleep 1
          done

          if [ ! -S /run/buildkit/buildkitd.sock ]; then
            echo "buildkitd failed to start"
            exit 1
          fi

      - name: Build and import image
        run: |
          sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true

          echo "=== Building ${{ steps.env.outputs.image }} ==="
          buildctl --addr unix:///run/buildkit/buildkitd.sock build \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt filename=Dockerfile \
            --output type=docker,name=${{ steps.env.outputs.image }},dest=/tmp/portafolio.tar

          echo "=== Importing image ==="
          ctr -a $CONTAINERD_SOCK -n k8s.io images import /tmp/portafolio.tar 2>&1 || {
            echo "Import failed, retrying..."
            sleep 3
            ctr -a $CONTAINERD_SOCK -n k8s.io images import /tmp/portafolio.tar 2>&1
          }
          rm -f /tmp/portafolio.tar

          if ctr -a $CONTAINERD_SOCK -n k8s.io images ls | grep -q "${{ steps.env.outputs.image }}"; then
            echo "Image verified: ${{ steps.env.outputs.image }}"
          else
            echo "ERROR: Image not found after import!"
            exit 1
          fi

      - name: Update deployment image
        run: |
          kubectl -n $NAMESPACE patch deployment ${{ steps.env.outputs.deploy_name }} -p \
            '{"spec":{"template":{"spec":{"containers":[{"name":"portafolio","image":"docker.io/library/${{ steps.env.outputs.image }}","imagePullPolicy":"Never"}]}}}}'

      - name: Wait for rollout
        run: |
          DEPLOY="${{ steps.env.outputs.deploy_name }}"
          if ! kubectl -n $NAMESPACE rollout status deployment/$DEPLOY --timeout=180s 2>/dev/null; then
            echo "$DEPLOY rollout timed out"
            kubectl -n $NAMESPACE get pods -l app=$DEPLOY -o wide

            kubectl -n $NAMESPACE get pods -l app=$DEPLOY --field-selector=status.phase!=Running -o name \
              | xargs -r kubectl -n $NAMESPACE delete --force --grace-period=0 2>/dev/null || true

            echo "Rolling back..."
            kubectl -n $NAMESPACE rollout undo deployment/$DEPLOY
            kubectl -n $NAMESPACE rollout status deployment/$DEPLOY --timeout=60s || true
            exit 1
          fi

          echo "Deploy successful: $DEPLOY"

      - name: Cleanup buildkitd
        if: always()
        run: |
          pkill buildkitd || true
          sleep 2
          if pgrep buildkitd > /dev/null; then
            kill -9 $(pgrep buildkitd) 2>/dev/null || true
          fi
